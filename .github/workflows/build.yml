name: Build Zozstry Linux AppImage

on:
  push:
    branches:
      - main # Automatically builds when you push to main
  workflow_dispatch: # Adds a button in GitHub to trigger it manually

jobs:
  build-linux:
    name: Build on Ubuntu 22.04 (Max Compatibility)
    runs-on: ubuntu-22.04 # This is the magic line that fixes the glibc issue!

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust (Stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies (Ubuntu 22.04 compatible)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Tauri App
        run: npm run tauri build

      - name: Upload Debian Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zozstry-Linux-DEB
          path: src-tauri/target/release/bundle/deb/*.deb